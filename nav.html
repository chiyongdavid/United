<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五維決策與德運作終極系統</title>
    <style>
        :root {
            --bg: #f5f2ed; --ink: #1a1a1a; --accent: #8a7d6a; --gold: #b39964;
            --stop: #d0021b; --wait: #4a90e2; --store: #50e3c2; --move: #00c853; --shift: #9013fe;
            --paper: #ffffff;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", serif; background: var(--bg); color: var(--ink); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #app-container { background: var(--paper); max-width: 550px; width: 100%; padding: 30px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #dcd7cf; }
        
        h1 { text-align: center; font-size: 1.6rem; letter-spacing: 4px; margin: 0 0 10px 0; }
        .tab-nav { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 2px solid #eee; }
        .tab-item { padding: 10px; font-weight: bold; color: #ccc; cursor: pointer; }
        .tab-item.active { color: var(--ink); border-bottom: 3px solid var(--ink); }

        .q-block { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #f7f7f7; }
        .q-title { font-weight: 700; margin-bottom: 4px; display: block; color: #333; font-size: 1rem; }
        .q-desc { font-size: 0.8rem; color: #999; margin-bottom: 10px; }

        .options { display: flex; gap: 4px; }
        .opt-btn { flex: 1; padding: 12px 1px; font-size: 10px; border: 1px solid #eee; background: #fafafa; cursor: pointer; border-radius: 4px; font-weight: 600; color: #666; transition: 0.2s; }
        .opt-btn.active { background: var(--ink) !important; color: white !important; border-color: var(--ink) !important; }

        .nav-btn { width: 100%; padding: 18px; background: var(--ink); color: white; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; letter-spacing: 2px; }

        /* 結果區視覺 */
        #result-box { display: none; text-align: center; animation: zoomIn 0.4s ease-out; }
        .indicator-circle {
            width: 150px; height: 150px; border: 8px solid currentColor; border-radius: 50%;
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            position: relative; background: #fff;
        }
        .status-text { font-size: 3rem; font-weight: 900; letter-spacing: -1px; background: #fff; padding: 0 10px; position: absolute; z-index: 10; }
        .desc-text { font-size: 1.5rem; font-weight: 800; color: #333; margin-top: 10px; letter-spacing: 2px; }

        .diag-card { text-align: left; background: #fdfcf8; border: 1px solid #eee; padding: 18px; margin-top: 20px; border-left: 5px solid var(--gold); }
        .diag-card h4 { margin: 0 0 8px 0; color: var(--gold); font-size: 1rem; border-bottom: 1px solid #f0e6cc; padding-bottom: 5px; }
        .diag-text { font-size: 0.9rem; line-height: 1.7; color: #444; }

        .footer { font-style: italic; color: var(--accent); margin-top: 30px; border-top: 1px double #ddd; padding-top: 20px; font-size: 0.85rem; text-align: center; }
        
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="app-container">
    <h1>決策運作雙表系統</h1>
    
    <div class="tab-nav">
        <div id="tab1" class="tab-item active">壹、局勢判斷</div>
        <div id="tab2" class="tab-item">貳、德性診斷</div>
    </div>

    <!-- 第一部分：決策導航 -->
    <div id="section-1">
        <div class="q-block" id="row-dao">
            <span class="q-title">1. 道：方向是否契合？</span>
            <div class="q-desc">是否符合規律？無違反大勢本質？</div>
            <div class="options">
                <button class="opt-btn" onclick="score(1, 'dao', 2, this)">明確成立</button>
                <button class="opt-btn" onclick="score(1, 'dao', 1, this)">大致成立</button>
                <button class="opt-btn" onclick="score(1, 'dao', 0, this)">不確定</button>
                <button class="opt-btn" onclick="score(1, 'dao', -1, this)">有所偏差</button>
                <button class="opt-btn" onclick="score(1, 'dao', -2, this)">不成立</button>
            </div>
        </div>
        <div class="q-block" id="row-shi">
            <span class="q-title">2. 勢：時機是否成熟？</span>
            <div class="q-desc">現在是不是時候？節奏對不對？</div>
            <div class="options">
                <button class="opt-btn" onclick="score(1, 'shi', 2, this)">時機契合</button>
                <button class="opt-btn" onclick="score(1, 'shi', 1, this)">大致成熟</button>
                <button class="opt-btn" onclick="score(1, 'shi', 0, this)">觀望中</button>
                <button class="opt-btn" onclick="score(1, 'shi', -1, this)">操之過急</button>
                <button class="opt-btn" onclick="score(1, 'shi', -2, this)">時機已過</button>
            </div>
        </div>
        <div class="q-block" id="row-wu">
            <span class="q-title">3. 物/器：條件是否具備？</span>
            <div class="q-desc">資源、工具、人脈是否到位？</div>
            <div class="options">
                <button class="opt-btn" onclick="score(1, 'wu', 2, this)">明確成立</button>
                <button class="opt-btn" onclick="score(1, 'wu', 1, this)">大致成立</button>
                <button class="opt-btn" onclick="score(1, 'wu', 0, this)">不確定</button>
                <button class="opt-btn" onclick="score(1, 'wu', -1, this)">有所偏差</button>
                <button class="opt-btn" onclick="score(1, 'wu', -2, this)">不成立</button>
            </div>
        </div>
        <button class="nav-btn" onclick="goToStep2()">下一步：內在診斷</button>
    </div>

    <!-- 第二部分：德診斷 -->
    <div id="section-2" style="display:none;">
        <div class="q-block" id="row-xu">
            <span class="q-title">4. 蓄與止：是否蓄養且知止？</span>
            <div class="q-desc">能量是否持續累積？是否知道在哪停？</div>
            <div class="options">
                <button class="opt-btn" onclick="score(2, 'xu', 2, this)">明確成立</button>
                <button class="opt-btn" onclick="score(2, 'xu', 1, this)">大致成立</button>
                <button class="opt-btn" onclick="score(2, 'xu', 0, this)">不確定</button>
                <button class="opt-btn" onclick="score(2, 'xu', -1, this)">有所偏差</button>
                <button class="opt-btn" onclick="score(2, 'xu', -2, this)">不成立</button>
            </div>
        </div>
        <div class="q-block" id="row-gan">
            <span class="q-title">5. 不干擾：是否過度干預？</span>
            <div class="q-desc">是否強行控制本該自主運作的事？</div>
            <div class="options">
                <button class="opt-btn" onclick="score(2, 'gan', 2, this)">明確成立</button>
                <button class="opt-btn" onclick="score(2, 'gan', 1, this)">大致成立</button>
                <button class="opt-btn" onclick="score(2, 'gan', 0, this)">不確定</button>
                <button class="opt-btn" onclick="score(2, 'gan', -1, this)">有所偏差</button>
                <button class="opt-btn" onclick="score(2, 'gan', -2, this)">不成立</button>
            </div>
        </div>
        <button class="nav-btn" onclick="calculateAll()">查看終極導航結果</button>
    </div>

    <!-- 第三部分：結果 -->
    <div id="result-box">
        <div class="indicator-circle" id="circle-box">
            <span class="status-text" id="status-display"></span>
        </div>
        <div class="desc-text" id="desc-display"></div>

        <div class="diag-card">
            <h4>💡 雙表聯動分析</h4>
            <div id="diag-text" class="diag-text"></div>
        </div>
        
        <p class="footer">「局告訴你在哪裡，德告訴你能不能動。」</p>
        <button onclick="location.reload()" style="margin-top:15px; background:none; border:none; color:var(--accent); cursor:pointer; text-decoration: underline;">← 重新診斷</button>
    </div>
</div>

<script>
    let scores1 = { dao: null, shi: null, wu: null };
    let scores2 = { xu: null, gan: null };

    function score(step, key, val, btn) {
        if(step === 1) scores1[key] = val;
        else scores2[key] = val;
        
        const parent = btn.parentElement;
        parent.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function goToStep2() {
        if(Object.values(scores1).includes(null)) return alert("請完成局勢判斷。");
        document.getElementById('section-1').style.display = 'none';
        document.getElementById('section-2').style.display = 'block';
        document.getElementById('tab1').classList.remove('active');
        document.getElementById('tab2').classList.add('active');
    }

    function calculateAll() {
        if(Object.values(scores2).includes(null)) return alert("請完成內在診斷。");
        
        document.getElementById('section-2').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.querySelector('.tab-nav').style.display = 'none';

        const total1 = scores1.dao + scores1.shi + scores1.wu;
        const total2 = scores2.xu + scores2.gan;
        
        const icon = document.getElementById('status-display');
        const box = document.getElementById('circle-box');
        const desc = document.getElementById('desc-display');
        const diag = document.getElementById('diag-text');

        // 雙表聯動核心邏輯
        const situationIsGood = (total1 >= 2);
        const deIsStrong = (total2 >= 1);

        if (scores1.dao <= -1 || (total1 < 0 && total2 < 0)) {
            icon.innerText = "止"; box.style.color = "var(--stop)";
            desc.innerText = "立 即 止 損";
            diag.innerHTML = "<b>局差 ＋ 德差：</b>內外皆崩。外部風險極大且內部承載力已耗散。任何行動都是多餘的消耗，必須立即停止。";
        } else if (situationIsGood && deIsStrong) {
            icon.innerText = "動"; box.style.color = "var(--move)";
            desc.innerText = "果 斷 行 動";
            diag.innerHTML = "<b>局好 ＋ 德好：</b>天時地利人和。外在時機契合且內在結構穩健，這是推進決策的最佳時機。";
        } else if (situationIsGood && !deIsStrong) {
            icon.innerText = "止"; box.style.color = "var(--stop)";
            desc.innerText = "不 要 動";
            diag.innerHTML = "<b>局好 ＋ 德差：</b>極度危險。雖然外部看起來是機會，但內在承載力不足（德耗散）。此時行動必因內耗而敗，請先修補內在。";
        } else if (!situationIsGood && deIsStrong) {
            icon.innerText = "等"; box.style.color = "var(--wait)";
            desc.innerText = "靜 待 時 機";
            diag.innerHTML = "<b>局差 ＋ 德好：</b>深藏不露。外部環境尚未成熟，但你內在結構穩健。此時應蓄養能量，等待局勢轉向。";
        } else {
            icon.innerText = "蓄"; box.style.color = "var(--store)";
            desc.innerText = "養 精 蓄 銳";
            diag.innerHTML = "<b>臨界狀態：</b>能量正在蓄積但尚未契合。不要急於表現，優先進行內部蓄養與資源補充。";
        }
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
