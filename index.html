<!DOCTYPE html>
<!-- saved from url=(0025)http://laoziworkshop.com/ -->
<html lang="en" class="js-ready"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>帛書老子別裁:道德的生成與運作系統｜The Mawangdui Laozi: The Generative and Operational System of Dao (An Interpretive Reconstruction)</title>
  <meta name="description" content="《帛書老子別裁:道德的生成與運作系統》／The Mawangdui Laozi: The Generative and Operational System of Dao (An Interpretive Reconstruction)（齊庸／Chi Yong，Laozi Workshop Institute，Taipei 2026，ISBN 9786260149482）。">
  <style>
    :root{
      color-scheme:light;
      --bg:#f5f0e6;               /* 宣紙背景 */
      --ink:#faf7f0;              /* 纸墨层 */
      --paper:#1f1c15;            /* 文字顏色 */
      --gold:#c3a76d;             /* 金色點綴 */
      --white:#ffffff;
      --black:#0d0d0d;
      --muted:#5f5644;            /* 注釋色 */
      --surface-border:rgba(142,116,70,.28);
      --ribbon-bg:rgba(249,245,236,.82);
      --ribbon-border:rgba(195,167,109,.4);
      --body-gradient:radial-gradient(1400px 900px at 20% 10%, rgba(195,167,109,.15) 0 35%, rgba(255,255,255,.6) 60%, var(--bg) 100%);
    }

    body[data-theme="dark"]{
      color-scheme:dark;
      --bg:#0b0b0b;
      --ink:#111213;
      --paper:#f5f2eb;
      --muted:#b7b1a6;
      --surface-border:rgba(195,167,109,.2);
      --ribbon-bg:rgba(15,15,15,.72);
      --ribbon-border:rgba(195,167,109,.25);
      --body-gradient:radial-gradient(1200px 800px at 20% 10%, #141414 0 35%, #0f0f0f 60%, var(--bg) 100%);
    }

    html,body{height:100%;}
    body{
      margin:0; color:var(--paper); background:var(--body-gradient);
      font-family: "Noto Serif TC", "Noto Serif SC", "Songti SC", "STSong", "Times New Roman", serif;
      letter-spacing:.2px;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      transition:background-color .4s ease, color .3s ease;
    }

    /* 宣纸颗粒与墨晕 */
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none; z-index:-1;
      background:
        radial-gradient(1200px 700px at 70% 20%, rgba(195,167,109,.18), transparent 60%),
        radial-gradient(900px 600px at 30% 80%, rgba(195,167,109,.12), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.02));
      mix-blend-mode:soft-light;
      filter: saturate(.9) contrast(1.05);
    }

    .container{max-width:1200px; margin:0 auto; padding:24px clamp(16px, 4vw, 48px);}

    .variant{display:none;}
    body.is-desktop .variant-desktop,
    body.is-mobile .variant-mobile{display:block;}

    body.is-mobile .container{padding:24px clamp(18px, 6vw, 32px);}

    /* 顶部条：持续提醒加入社群 */
    .ribbon{
      position:sticky; top:0; z-index:50;
      display:flex; gap:10px; align-items:center; justify-content:center;
      padding:10px 14px; background:var(--ribbon-bg); backdrop-filter: blur(8px);
      border-bottom:1px solid var(--ribbon-border);
      font-size:14px; color:var(--paper);
    }
    .ribbon .dot{width:8px;height:8px;border-radius:50%;background:var(--gold); box-shadow:0 0 0 0 rgba(195,167,109,.7); animation:ping 2s infinite;}
    @keyframes ping{0%{box-shadow:0 0 0 0 rgba(195,167,109,.7)}70%{box-shadow:0 0 0 12px rgba(195,167,109,0)}100%{box-shadow:0 0 0 0 rgba(195,167,109,0)}}
    .ribbon strong{color:var(--gold); margin:0 6px;}

    /* 英雄区 */
    .hero{
      position:relative;
      isolation:isolate;
      display:grid;
      grid-template-columns:minmax(320px, 1fr) minmax(280px, .9fr);
      gap:clamp(32px, 6vw, 96px);
      align-items:center;
      padding:clamp(48px, 12vh, 120px) 0;
    }
    .hero > div:first-child{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      gap:clamp(18px, 3vw, 32px);
    }
    @media (max-width:980px){
      .hero{
        grid-template-columns:1fr;
        grid-auto-rows:auto;
        justify-items:center;
        text-align:center;
      }
      .hero > div:first-child{align-items:center;}
    }

    .title{
      font-size: clamp(36px, 5vw, 64px);
      line-height:1.1; margin:0 0 16px; font-weight:600;
      text-shadow: 0 12px 40px rgba(195,167,109,.12);
    }
    .subtitle{color:var(--muted); font-size:clamp(15px, 2vw, 18px); margin:0 0 28px;}

    .callouts{display:flex; flex-wrap:wrap; gap:16px; align-items:center;}
    .cta{
      --btn-bg: rgba(255,255,255,.65);
      --btn-border: rgba(195,167,109,.35);
      display:inline-flex; align-items:center; gap:10px; padding:12px 18px;
      border:1px solid var(--btn-border); border-radius:14px; background:var(--btn-bg);
      color:var(--paper); text-decoration:none; font-size:16px; font-weight:600;
      transition: transform .2s ease, box-shadow .3s ease, border-color .2s ease; position:relative; overflow:hidden;
    }
    .cta.gold{background:linear-gradient(180deg, rgba(195,167,109,.22), rgba(195,167,109,.12)); color:var(--black);}
    body[data-theme="dark"] .cta{--btn-bg: rgba(23,23,23,.9);}
    body[data-theme="dark"] .cta.gold{color:var(--paper); background:linear-gradient(180deg, rgba(195,167,109,.18), rgba(195,167,109,.08));}
    .cta .fa-brands{font-size:20px}
    .cta:hover{transform:translateY(-2px); box-shadow:0 10px 30px rgba(195,167,109,.24); border-color:rgba(195,167,109,.55)}
    .cta:focus-visible{outline:2px solid var(--gold); outline-offset:3px}
    @media (max-width:980px){
      
    }

    /* 分割线（如水波） */
    .wave{ height:2px; width:100%; margin:56px 0; background:linear-gradient(90deg, transparent, rgba(195,167,109,.6), transparent); filter:blur(.2px)}

    /* 内容区 - 道德经片段（可替换） */
    .content{display:grid; grid-template-columns:1fr 1fr; gap:28px;}
    @media (max-width:920px){.content{grid-template-columns:1fr}}
    .card{ background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.00)); border:1px solid var(--surface-border);
      border-radius:18px; padding:22px 20px; box-shadow: 0 10px 40px rgba(0,0,0,.35);
    }
    .card h3{margin:0 0 10px; font-weight:600; color:var(--gold)}
    .card p{margin:0; color:var(--paper); opacity:.95; line-height:1.75}

    /* 页脚 */
    footer{ margin:64px 0 24px; color:var(--muted); font-size:14px; text-align:center}

    /* 控制區域 */
    .topbar{
      display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:18px;
      padding-top:32px;
    }

    .control-panel{
      display:flex; flex-wrap:wrap; gap:16px;
      align-items:center;
    }

    .control{
      display:flex; flex-direction:column; gap:6px;
      min-width:160px;
      font-size:14px;
      color:var(--muted);
    }

    .control label, .control span{font-weight:600; letter-spacing:.4px; text-transform:uppercase; font-size:12px; color:var(--muted);}

    select,
    .theme-toggle{
      font-family:inherit; font-size:14px; border-radius:12px; border:1px solid var(--surface-border);
      padding:10px 14px; background:rgba(255,255,255,.65); color:var(--paper);
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease, color .2s ease;
    }

    body[data-theme="dark"] select,
    body[data-theme="dark"] .theme-toggle{
      background:rgba(16,16,16,.75);
    }

    select:focus-visible,
    .theme-toggle:focus-visible{
      outline:2px solid var(--gold); outline-offset:3px;
    }

    .theme-toggle[aria-pressed="true"]{
      border-color:rgba(195,167,109,.6); box-shadow:0 0 0 3px rgba(195,167,109,.18);
    }

    .theme-toggle{cursor:pointer; display:inline-flex; align-items:center; gap:8px; font-weight:600;}

    .theme-toggle .icon{font-size:16px;}

    @media (max-width:640px){
      .control{min-width:140px;}
    }

    /* 移动端专属布局 */
    .variant-mobile .mobile-topbar{
      display:flex; flex-direction:column; gap:20px; padding-top:28px;
    }

    .variant-mobile .mobile-topbar__intro{ text-align:center; }

    .variant-mobile .mobile-controls{
      display:flex; flex-wrap:wrap; justify-content:center; gap:16px;
    }

    .variant-mobile .mobile-control{
      display:flex; flex-direction:column; gap:6px; min-width:140px;
      font-size:12px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted);
    }

    .variant-mobile .mobile-control label,
    .variant-mobile .mobile-control .mobile-control__label{font-weight:600;}

    .variant-mobile .mobile-control select{
      font-family:inherit; font-size:14px; border-radius:12px; border:1px solid var(--surface-border);
      padding:10px 14px; background:rgba(255,255,255,.7); color:var(--paper);
      transition:border-color .2s ease, box-shadow .2s ease, background .2s ease, color .2s ease;
      width:100%;
    }

    body[data-theme="dark"] .variant-mobile .mobile-control select{
      background:rgba(16,16,16,.75);
    }

    .variant-mobile .mobile-control select:focus-visible{
      outline:2px solid var(--gold); outline-offset:3px;
    }

    .variant-mobile .mobile-control--button{align-items:stretch;}

    .variant-mobile .mobile-control--button .theme-toggle{width:100%; justify-content:center;}

    .variant-mobile .mobile-hero{
      position:relative;
      isolation:isolate;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:24px;
      text-align:center;
      padding:48px 0 32px;
      overflow:hidden;
    }
    .variant-mobile .mobile-hero__content{ position:relative; z-index:1; display:flex; flex-direction:column; gap:18px; align-items:center; }

    .variant-mobile .mobile-callouts{
      display:flex; flex-direction:column; gap:14px; width:100%;
    }

    .variant-mobile .mobile-callouts .cta{width:100%; justify-content:center;}

    .variant-mobile .mobile-insights{
      display:grid; gap:18px; padding-bottom:36px;
    }

    .variant-mobile .mobile-footer{ text-align:center; color:var(--muted); margin:48px 0 12px; font-size:14px; }
  
    /* 圆形照片（桌面与移动端均生效） */
    .hero-circle-photo{
      place-self:center;
      width:clamp(140px, 22vw, 280px);
