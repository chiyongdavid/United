<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laozi Navigation System</title>
    <style>
        :root {
            --bg: #f4f1ea; --ink: #1a1a1a; --accent: #8a7d6a; --gold: #b39964;
            --stop: #d0021b; --wait: #4a90e2; --store: #50e3c2; --move: #00c853; --shift: #9013fe;
            --paper: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #quiz-app { background: var(--paper); max-width: 520px; width: 100%; padding: 30px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #dcd7cf; }
        
        h1 { text-align: center; font-size: 1.5rem; letter-spacing: 2px; margin: 0; font-weight: 800; }
        .subtitle { text-align: center; color: var(--accent); font-size: 0.8rem; margin-bottom: 20px; display: block; border-bottom: 1px solid #eee; padding-bottom: 15px; text-transform: uppercase; font-weight: 600; }

        .q-block { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #f7f7f7; }
        .q-title { font-weight: 700; margin-bottom: 10px; display: block; color: #333; font-size: 1rem; }

        .options { display: flex; gap: 4px; }
        .opt-btn { 
            flex: 1; padding: 12px 1px; font-size: 9px; border: 1px solid #eee; 
            background: #fafafa; cursor: pointer; border-radius: 4px; 
            text-transform: uppercase; font-weight: 600; color: #666; transition: 0.2s;
        }
        /* 修正點：確保 active 樣式強制執行 */
        .opt-btn.active { background: var(--ink) !important; color: white !important; border-color: var(--ink) !important; }

        #submit-btn { width: 100%; padding: 18px; background: var(--ink); color: white; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; letter-spacing: 2px; }

        /* 視覺結果區 */
        #result-box { display: none; margin-top: 30px; text-align: center; animation: zoomIn 0.4s ease-out; }
        
        .indicator-circle {
            width: 160px; height: 160px; border: 7px solid currentColor; border-radius: 50%;
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            position: relative; background: #fff;
        }
        .status-text {
            font-size: 3rem; font-weight: 900; letter-spacing: -1px;
            background: #fff; padding: 0 10px; position: absolute; z-index: 10;
        }
        .desc-text { font-size: 1.4rem; font-weight: 800; color: #333; text-transform: uppercase; margin-top: 10px; letter-spacing: 1px; }

        .diag-card { text-align: left; background: #fdfcf8; border: 1px solid #eee; padding: 18px; margin-top: 25px; border-left: 5px solid var(--gold); }
        .diag-card h4 { margin: 0 0 8px 0; color: var(--gold); font-size: 0.95rem; border-bottom: 1px solid #f0e6cc; padding-bottom: 5px; text-transform: uppercase; }
        .diag-text { font-size: 0.9rem; line-height: 1.6; color: #444; }

        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="quiz-app">
    <h1>Laozi Navigation System</h1>
    <span class="subtitle">Decision Dashboard</span>

    <div id="questions-list">
        <!-- 確保 ID 唯一且 JS 可抓取 -->
        <div class="q-block" id="q-0">
            <span class="q-title">1. Dao (Alignment)</span>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(0, 2, this)">Aligned</button>
                <button class="opt-btn" onclick="selectScore(0, 1, this)">Mostly</button>
                <button class="opt-btn" onclick="selectScore(0, 0, this)">Unsure</button>
                <button class="opt-btn" onclick="selectScore(0, -1, this)">Misaligned</button>
                <button class="opt-btn" onclick="selectScore(0, -2, this)">Flawed</button>
            </div>
        </div>
        <div class="q-block" id="q-1">
            <span class="q-title">2. De (Sustainability)</span>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(1, 2, this)">Sustainable</button>
                <button class="opt-btn" onclick="selectScore(1, 1, this)">Mostly</button>
                <button class="opt-btn" onclick="selectScore(1, 0, this)">Uncertain</button>
                <button class="opt-btn" onclick="selectScore(1, -1, this)">Strained</button>
                <button class="opt-btn" onclick="selectScore(1, -2, this)">Failing</button>
            </div>
        </div>
        <div class="q-block" id="q-2">
            <span class="q-title">3. Conditions</span>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(2, 2, this)">Ready</button>
                <button class="opt-btn" onclick="selectScore(2, 1, this)">Mostly</button>
                <button class="opt-btn" onclick="selectScore(2, 0, this)">Uncertain</button>
                <button class="opt-btn" onclick="selectScore(2, -1, this)">Lacking</button>
                <button class="opt-btn" onclick="selectScore(2, -2, this)">Not Ready</button>
            </div>
        </div>
        <div class="q-block" id="q-3">
            <span class="q-title">4. Means</span>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(3, 2, this)">Capable</button>
                <button class="opt-btn" onclick="selectScore(3, 1, this)">Mostly</button>
                <button class="opt-btn" onclick="selectScore(3, 0, this)">Uncertain</button>
                <button class="opt-btn" onclick="selectScore(3, -1, this)">Insufficient</button>
                <button class="opt-btn" onclick="selectScore(3, -2, this)">Not Feasible</button>
            </div>
        </div>
        <div class="q-block" id="q-4">
            <span class="q-title">5. Timing</span>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(4, 2, this)">Perfect</button>
                <button class="opt-btn" onclick="selectScore(4, 1, this)">Right</button>
                <button class="opt-btn" onclick="selectScore(4, 0, this)">Uncertain</button>
                <button class="opt-btn" onclick="selectScore(4, -1, this)">Premature</button>
                <button class="opt-btn" onclick="selectScore(4, -2, this)">Too Late</button>
            </div>
        </div>
    </div>

    <button id="submit-btn" onclick="calculateResult()">Generate Output</button>

    <div id="result-box">
        <div class="indicator-circle" id="circle-box">
            <span class="status-text" id="status-display"></span>
        </div>
        <div class="desc-text" id="desc-display"></div>

        <div class="diag-card">
            <h4>💡 Systemic Assessment</h4>
            <div id="analysis-text" class="diag-text"></div>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:var(--accent); cursor:pointer; text-decoration: underline;">← Restart Calibration</button>
    </div>
</div>

<script>
    // 儲存五個維度的分數
    let currentScores = [null, null, null, null, null];

    function selectScore(idx, val, btn) {
        // 更新該題分數
        currentScores[idx] = val;
        
        // 抓取該題區塊
        const parent = document.getElementById(`q-${idx}`);
        const btns = parent.querySelectorAll('.opt-btn');
        
        // 清除該題所有按鈕的 active 狀態
        btns.forEach(b => b.classList.remove('active'));
        
        // 幫被點擊的按鈕加上 active
        btn.classList.add('active');
    }

    function calculateResult() {
        if (currentScores.includes(null)) {
            alert("Please complete all 5 dimensions before generating results.");
            return;
        }

        const total = currentScores.reduce((a, b) => a + b, 0);
        const [dao, de, wu, qi, shi] = currentScores;
        
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('questions-list').style.display = 'none';

        const icon = document.getElementById('status-display');
        const box = document.getElementById('circle-box');
        const desc = document.getElementById('desc-display');
        const analysis = document.getElementById('analysis-text');

        // 決策邏輯判定
        if (dao <= -1) {
            icon.innerText = "STOP"; box.style.color = "var(--stop)";
            desc.innerText = "CEASE IMMEDIATELY";
            analysis.innerText = "Fundamental Flaw: The core direction is misaligned. Execution will only accelerate failure.";
        } else if (shi <= -1) {
            icon.innerText = "SHIFT"; box.style.color = "var(--shift)";
            desc.innerText = "CHANGE DIRECTION";
            analysis.innerText = "Timing Friction: Pivot or wait for a supportive shift in momentum.";
        } else if (total >= 7) {
            icon.innerText = "MOVE"; box.style.color = "var(--move)";
            desc.innerText = "DECISIVE ACTION";
            analysis.innerText = "Optimal Alignment: Direction, capacity, and timing are perfectly synchronized.";
        } else if (de < 1) {
            icon.innerText = "STORE"; box.style.color = "var(--store)";
            desc.innerText = "ACCUMULATE POWER";
            analysis.innerText = "Capacity Gap: Direction is correct, but internal sustainability (De) is insufficient.";
        } else {
            icon.innerText = "WAIT"; box.style.color = "var(--wait)";
            desc.innerText = "OBSERVE & WAIT";
            analysis.innerText = "Unclear Signals: Maintain stillness until the situation ripens.";
        }
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
