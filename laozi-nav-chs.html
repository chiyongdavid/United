<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五维决策导航 - 帛书老子研修社</title>
    <style>
        :root {
            --bg: #f4f1ea; --ink: #1a1a1a; --accent: #8a7d6a; --gold: #b39964;
            --stop: #d0021b; --wait: #4a90e2; --store: #50e3c2; --move: #00c853; --shift: #9013fe;
            --paper: #ffffff;
        }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #quiz-app { background: var(--paper); max-width: 520px; width: 100%; padding: 30px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #dcd7cf; }
        
        h1 { text-align: center; font-size: 1.6rem; letter-spacing: 4px; margin: 0; font-weight: 800; }
        .subtitle { text-align: center; color: var(--accent); font-size: 0.85rem; margin-bottom: 20px; display: block; border-bottom: 1px solid #eee; padding-bottom: 15px; font-weight: 600; }

        .q-block { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #f7f7f7; }
        .q-title { font-weight: 700; margin-bottom: 4px; display: block; color: #333; font-size: 1rem; }
        .q-desc { font-size: 0.8rem; color: #999; margin-bottom: 10px; }

        .options { display: flex; gap: 4px; }
        .opt-btn { 
            flex: 1; padding: 12px 1px; font-size: 10px; border: 1px solid #eee; 
            background: #fafafa; cursor: pointer; border-radius: 4px; 
            font-weight: 600; color: #666; transition: 0.2s;
        }
        .opt-btn.active { background: var(--ink) !important; color: white !important; border-color: var(--ink) !important; }

        #submit-btn { width: 100%; padding: 18px; background: var(--ink); color: white; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; letter-spacing: 2px; }

        /* 结果视觉区 */
        #result-box { display: none; margin-top: 30px; text-align: center; animation: zoomIn 0.4s ease-out; }
        
        .indicator-circle {
            width: 160px; height: 160px; border: 7px solid currentColor; border-radius: 50%;
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            position: relative; background: #fff;
        }
        .status-text {
            font-size: 3rem; font-weight: 900; letter-spacing: -1px;
            background: #fff; padding: 0 10px; position: absolute; z-index: 10;
        }
        .desc-text { font-size: 1.4rem; font-weight: 800; color: #333; margin-top: 10px; letter-spacing: 1px; }

        .diag-card { text-align: left; background: #fdfcf8; border: 1px solid #eee; padding: 18px; margin-top: 25px; border-left: 5px solid var(--gold); }
        .diag-card h4 { margin: 0 0 8px 0; color: var(--gold); font-size: 0.95rem; border-bottom: 1px solid #f0e6cc; padding-bottom: 5px; }
        .diag-text { font-size: 0.9rem; line-height: 1.6; color: #444; }

        .warning-text { color: var(--stop); font-weight: bold; font-size: 0.85rem; margin-top: 10px; display: none; }

        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="quiz-app">
    <h1>五维决策导航</h1>
    <span class="subtitle">针对当下决定，凭直觉打分</span>

    <div id="questions-list">
        <!-- 维度 1: 道 -->
        <div class="q-block" id="q-0">
            <span class="q-title">1. 道：大势方向对不对？</span>
            <div class="q-desc">是否符合规律？大家往东你往西吗？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(0, 2, this)">明确成立</button>
                <button class="opt-btn" onclick="selectScore(0, 1, this)">大致成立</button>
                <button class="opt-btn" onclick="selectScore(0, 0, this)">不确定</button>
                <button class="opt-btn" onclick="selectScore(0, -1, this)">有问题</button>
                <button class="opt-btn" onclick="selectScore(0, -2, this)">不成立</button>
            </div>
        </div>
        <!-- 维度 2: 德 -->
        <div class="q-block" id="q-1">
            <span class="q-title">2. 德：我撑得住吗？</span>
            <div class="q-desc">承受力、底子是否足够？是否在硬扛？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(1, 2, this)">明确成立</button>
                <button class="opt-btn" onclick="selectScore(1, 1, this)">大致成立</button>
                <button class="opt-btn" onclick="selectScore(1, 0, this)">不确定</button>
                <button class="opt-btn" onclick="selectScore(1, -1, this)">有问题</button>
                <button class="opt-btn" onclick="selectScore(1, -2, this)">不成立</button>
            </div>
        </div>
        <!-- 维度 3: 物 -->
        <div class="q-block" id="q-2">
            <span class="q-title">3. 物：资源到位了吗？</span>
            <div class="q-desc">人、钱、物料等资源齐不齐？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(2, 2, this)">明确成立</button>
                <button class="opt-btn" onclick="selectScore(2, 1, this)">大致成立</button>
                <button class="opt-btn" onclick="selectScore(2, 0, this)">不确定</button>
                <button class="opt-btn" onclick="selectScore(2, -1, this)">有问题</button>
                <button class="opt-btn" onclick="selectScore(2, -2, this)">不成立</button>
            </div>
        </div>
        <!-- 维度 4: 器 -->
        <div class="q-block" id="q-3">
            <span class="q-title">4. 器：方法工具顺手吗？</span>
            <div class="q-desc">方法对不对？流程是否存在卡顿？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(3, 2, this)">明确成立</button>
                <button class="opt-btn" onclick="selectScore(3, 1, this)">大致成立</button>
                <button class="opt-btn" onclick="selectScore(3, 0, this)">不确定</button>
                <button class="opt-btn" onclick="selectScore(3, -1, this)">有问题</button>
                <button class="opt-btn" onclick="selectScore(3, -2, this)">不成立</button>
            </div>
        </div>
        <!-- 维度 5: 势 -->
        <div class="q-block" id="q-4">
            <span class="q-title">5. 势：时机节奏对不對？</span>
            <div class="q-desc">现在是时候吗？是否存在硬推情况？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectScore(4, 2, this)">明确成立</button>
                <button class="opt-btn" onclick="selectScore(4, 1, this)">大致成立</button>
                <button class="opt-btn" onclick="selectScore(4, 0, this)">不确定</button>
                <button class="opt-btn" onclick="selectScore(4, -1, this)">有问题</button>
                <button class="opt-btn" onclick="selectScore(4, -2, this)">不成立</button>
            </div>
        </div>
    </div>

    <button id="submit-btn" onclick="calculateResult()">查看决策导航结果</button>

    <div id="result-box">
        <div class="indicator-circle" id="circle-box">
            <span class="status-text" id="status-display"></span>
        </div>
        <div class="desc-text" id="desc-display"></div>

        <div class="diag-card">
            <h4>💡 决策行动建议</h4>
            <div id="diag-text" class="diag-text"></div>
            <div id="warn-msg" class="warning-text">⚠️ 警示：存在 -2 分死穴，必须先解决！</div>
        </div>
        
        <p style="font-size: 0.8rem; color: #aaa; margin-top: 20px;">道看方向，德看底子，物看资源，器看工具，势看时机。</p>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; color:var(--accent); cursor:pointer; text-decoration: underline;">← 重新诊断</button>
    </div>
</div>

<script>
    let currentScores = [null, null, null, null, null];

    function selectScore(idx, val, btn) {
        currentScores[idx] = val;
        const parent = document.getElementById(`q-${idx}`);
        const btns = parent.querySelectorAll('.opt-btn');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function calculateResult() {
        if (currentScores.includes(null)) {
            alert("请完成所有维度的叩问。");
            return;
        }

        const total = currentScores.reduce((a, b) => a + b, 0);
        const [dao, de, wu, qi, shi] = currentScores;
        
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('questions-list').style.display = 'none';

        const icon = document.getElementById('status-display');
        const box = document.getElementById('circle-box');
        const desc = document.getElementById('desc-display');
        const diag = document.getElementById('diag-text');
        const warn = document.getElementById('warn-msg');

        // 实战判断逻辑
        if (dao <= -1 || currentScores.includes(-2)) {
            icon.innerText = "止"; box.style.color = "var(--stop)";
            desc.innerText = "必须停止";
            diag.innerText = "存在根本性障碍（死穴）或方向错误。总分低或有 -2 分项，不是运气问题，是根本条件不对，必须回头重新评估。";
            if (currentScores.includes(-2)) warn.style.display = "block";
        } else if (shi <= -1) {
            icon.innerText = "转"; box.style.color = "var(--shift)";
            desc.innerText = "需要调整";
            diag.innerText = "节奏或时机不对。即便大方向没错，但硬推会造成巨大内耗。请调整方法或等待时机。";
        } else if (total >= 6) {
            icon.innerText = "动"; box.style.color = "var(--move)";
            desc.innerText = "可以行动";
            diag.innerText = "条件成熟，五个维度大多顺着你。大方向对，资源足，底子稳，成功率较高。";
        } else if (total >= 0) {
            icon.innerText = "蓄"; box.style.color = "var(--store)";
            desc.innerText = "先补短板";
            diag.innerText = "勉强可行但风险尚存。看哪个维度分最低，先补它。补到 +1 以上再考虑行动。";
        } else {
            icon.innerText = "等"; box.style.color = "var(--wait)";
            desc.innerText = "先观察";
            diag.innerText = "条件不足。别急，先准备。至少把负分项全部拉回到 0 分以上再说。";
        }
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
