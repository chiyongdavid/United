<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德的運作診斷 - 帛書老子研修社</title>
    <style>
        :root {
            --bg: #f4f1ea; --ink: #2c2c2c; --accent: #8a7d6a; --gold: #b39964;
            --stop: #c0392b; --safe: #27ae60; --paper: #ffffff;
        }
        body { font-family: "PingFang TC", "Microsoft JhengHei", serif; background: var(--bg); color: var(--ink); margin: 0; padding: 15px; display: flex; justify-content: center; }
        #quiz-app { background: var(--paper); max-width: 520px; width: 100%; padding: 25px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #dcd7cf; }
        
        h1 { text-align: center; font-size: 1.5rem; letter-spacing: 4px; margin: 0 0 5px 0; }
        .subtitle { text-align: center; color: var(--accent); font-size: 0.8rem; margin-bottom: 20px; display: block; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .q-block { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #f9f9f9; }
        .q-title { font-weight: bold; font-size: 1rem; margin-bottom: 5px; display: block; color: #333; }
        .q-desc { font-size: 0.8rem; color: #999; margin-bottom: 12px; }

        .options { display: flex; gap: 4px; }
        .opt-btn { 
            flex: 1; padding: 10px 1px; font-size: 10px; border: 1px solid #eee; 
            background: #fafafa; cursor: pointer; border-radius: 4px; transition: 0.2s; 
            color: #666;
        }
        /* 修正點：確保 active 只作用於被選中的按鈕 */
        .opt-btn.active { background: var(--ink) !important; color: white !important; border-color: var(--ink) !important; }

        #submit-btn { width: 100%; padding: 16px; background: var(--ink); color: white; border: none; font-size: 1.1rem; cursor: pointer; margin-top: 10px; letter-spacing: 2px; font-weight: bold; }

        /* 結果區 */
        #result-box { display: none; margin-top: 20px; text-align: center; }
        .status-banner { padding: 15px; color: white; font-weight: bold; font-size: 1.4rem; border-radius: 4px; margin-bottom: 15px; }
        .diag-card { text-align: left; background: #fdfcf8; border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--gold); }
        .diag-text { font-size: 0.9rem; line-height: 1.6; color: #444; }
    </style>
</head>
<body>

<div id="quiz-app">
    <h1>德的運作診斷</h1>
    <span class="subtitle">帛書老子研修社｜生命系統承載檢測</span>

    <div id="questions-list">
        <!-- 每一題都加上獨取的 ID 確保 JS 能精準抓取 -->
        <div class="q-block" id="q0">
            <span class="q-title">1. 蓄養：能量是否持續累積？</span>
            <div class="q-desc">檢查：累積是否正在中斷、流失或停滯？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectOption(0, 2, this)">持續累積</button>
                <button class="opt-btn" onclick="selectOption(0, 1, this)">大致穩定</button>
                <button class="opt-btn" onclick="selectOption(0, 0, this)">不確定</button>
                <button class="opt-btn" onclick="selectOption(0, -1, this)">出現缺口</button>
                <button class="opt-btn" onclick="selectOption(0, -2, this)">嚴重流失</button>
            </div>
        </div>

        <div class="q-block" id="q1">
            <span class="q-title">2. 不干擾：是否過度干預？</span>
            <div class="q-desc">檢查：是否在強行控制本該自然運作的事？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectOption(1, 2, this)">放手信任</button>
                <button class="opt-btn" onclick="selectOption(1, 1, this)">少許插手</button>
                <button class="opt-btn" onclick="selectOption(1, 0, this)">不明確</button>
                <button class="opt-btn" onclick="selectOption(1, -1, this)">忍不住管</button>
                <button class="opt-btn" onclick="selectOption(1, -2, this)">強行控制</button>
            </div>
        </div>

        <div class="q-block" id="q2">
            <span class="q-title">3. 低耗：是否陷入對抗？</span>
            <div class="q-desc">檢查：是否為了證明正確而造成內耗？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectOption(2, 2, this)">不對抗</button>
                <button class="opt-btn" onclick="selectOption(2, 1, this)">微小摩擦</button>
                <button class="opt-btn" onclick="selectOption(2, 0, this)">臨界</button>
                <button class="opt-btn" onclick="selectOption(2, -1, this)">陷入對立</button>
                <button class="opt-btn" onclick="selectOption(2, -2, this)">劇烈消耗</button>
            </div>
        </div>

        <div class="q-block" id="q3">
            <span class="q-title">4. 柔性：應對是否柔韌？</span>
            <div class="q-desc">檢查：應對方式是剛硬僵執，還是順應轉化？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectOption(3, 2, this)">柔韌順應</button>
                <button class="opt-btn" onclick="selectOption(3, 1, this)">尚有彈性</button>
                <button class="opt-btn" onclick="selectOption(3, 0, this)">普通</button>
                <button class="opt-btn" onclick="selectOption(3, -1, this)">僵硬固執</button>
                <button class="opt-btn" onclick="selectOption(3, -2, this)">非黑即白</button>
            </div>
        </div>

        <div class="q-block" id="q4">
            <span class="q-title">5. 知止：是否知道停在哪？</span>
            <div class="q-desc">檢查：系統是否正在失控擴張、追加投入？</div>
            <div class="options">
                <button class="opt-btn" onclick="selectOption(4, 2, this)">知止不殆</button>
                <button class="opt-btn" onclick="selectOption(4, 1, this)">節制有度</button>
                <button class="opt-btn" onclick="selectOption(4, 0, this)">不明確</button>
                <button class="opt-btn" onclick="selectOption(4, -1, this)">過度追加</button>
                <button class="opt-btn" onclick="selectOption(4, -2, this)">失控過度</button>
            </div>
        </div>
    </div>

    <button id="submit-btn" onclick="showResult()">【 查看診斷結果 】</button>

    <div id="result-box">
        <div id="banner" class="status-banner"></div>
        <div class="diag-card">
            <h4 id="decision-title" style="margin-top:0; color:var(--ink);"></h4>
            <div id="diag-text" class="diag-text"></div>
        </div>
        <button onclick="location.reload()" style="margin-top:15px; background:none; border:none; color:var(--accent); cursor:pointer; text-decoration: underline; font-size: 0.8rem;">← 重新診斷</button>
    </div>
</div>

<script>
    // 儲存每題分數
    let userScores = [null, null, null, null, null];

    function selectOption(qIdx, score, btnElement) {
        // 更新分數
        userScores[qIdx] = score;

        // 移除該題所有按鈕的 active 狀態
        const row = document.getElementById(`q${qIdx}`);
        const btns = row.querySelectorAll('.opt-btn');
        btns.forEach(b => b.classList.remove('active'));

        // 幫被點擊的按鈕加上 active
        btnElement.classList.add('active');
    }

    function showResult() {
        if (userScores.includes(null)) {
            alert("請完成所有診斷項目。");
            return;
        }

        const total = userScores.reduce((a, b) => a + b, 0);
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('questions-list').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'none';

        const banner = document.getElementById('banner');
        const dTitle = document.getElementById('decision-title');
        const diag = document.getElementById('diag-text');

        if (total >= 6) {
            banner.innerText = "德充足 (系統穩健)";
            banner.style.backgroundColor = "var(--safe)";
            dTitle.innerText = "判斷：可以行動";
            diag.innerText = "目前系統運作順暢，蓄養大於消耗。請繼續保持『不干預』的智慧。";
        } else if (total >= 0) {
            banner.innerText = "德偏弱 (結構鬆動)";
            banner.style.backgroundColor = "var(--gold)";
            dTitle.innerText = "判斷：保持觀望";
            diag.innerText = "建議進入『蓄』的環節。停止擴張，重新累積資源與信任。";
        } else {
            banner.innerText = "德不足 (耗散開始)";
            banner.style.backgroundColor = "var(--stop)";
            dTitle.innerText = "判斷：不要動";
            diag.innerText = "能量正處於劇烈損耗中。對抗與控制過度。必須啟動『止』，防止結構性崩潰。";
        }
        
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
