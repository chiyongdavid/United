<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老子智慧導航：五維決策測驗</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", serif; background-color: #f4f1ea; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 90%; text-align: center; border: 1px solid #d1c7b7; }
        .progress { font-size: 0.9rem; color: #a69b88; margin-bottom: 1rem; letter-spacing: 2px; }
        h1 { color: #5d5b57; font-size: 1.4rem; margin-bottom: 2rem; line-height: 1.4; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border: 1px solid #d1c7b7; background: #faf9f6; border-radius: 10px; cursor: pointer; transition: all 0.3s; font-size: 1.1rem; color: #444; }
        .option-btn:hover { background: #5d5b57; color: white; transform: translateY(-2px); }
        .hidden { display: none; }
        #result-text { line-height: 1.8; text-align: left; white-space: pre-line; font-size: 1.1rem; color: #444; border-top: 1px dashed #d1c7b7; pt: 20px; margin-top: 20px; }
        .keyword { font-weight: bold; color: #8a7d6a; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="quiz-container">
    <!-- 測驗介面 -->
    <div id="quiz-ui">
        <div class="progress" id="progress">引導開始</div>
        <h1 id="question-text">正在開啟智慧導航...</h1>
        <div id="options-container"></div>
    </div>

    <!-- 結果介面 -->
    <div id="result-ui" class="hidden">
        <h1 style="color: #8a7d6a;">導航指引：大道的啟示</h1>
        <div id="result-text"></div>
        <button class="option-btn" onclick="location.reload()" style="margin-top: 30px; background: #5d5b57; color: white;">重新叩問</button>
        <button class="option-btn" onclick="location.href='index.html'">返回首頁</button>
    </div>
</div>

<script>
    const questions = [
        { cat: "道", q: "「這件事是否成立？」", options: [{t: "符合自然規律，心中坦蕩", v: 1}, {t: "仍有疑慮，或帶有強求", v: 0}] },
        { cat: "德", q: "「我是否承受得住？」", options: [{t: "內心強大，足以承擔後果", v: 1}, {t: "感到勉強，力有未逮", v: 0}] },
        { cat: "物", q: "「條件是否具備？」", options: [{t: "萬事俱備，順勢而為", v: 1}, {t: "資材尚缺，仍需等待", v: 0}] },
        { cat: "器", q: "「是否做得成？」", options: [{t: "方法正確，工具合宜", v: 1}, {t: "技術未熟，尚在摸索", v: 0}] },
        { cat: "時", q: "「現在適不適合？」", options: [{t: "時機成熟，水到渠成", v: 1}, {t: "尚未合時，需守靜篤", v: 0}] }
    ];

    let currentIdx = 0;
    let totalScore = 0;

    function showQuestion() {
        if (currentIdx >= questions.length) return showResult();
        
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = `五維導航：${q.cat}`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.t;
            btn.onclick = () => { totalScore += opt.v; currentIdx++; showQuestion(); };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('result-ui').classList.remove('hidden');
        
        let advice = "";
        if (totalScore === 5) {
            advice = "【天人合一：大吉】\n道、德、物、器、時五維皆備。此時不作，更待何時？請堅定信念，順勢前行，必能大成。";
        } else if (totalScore >= 3) {
            advice = "【守中待時：中平】\n主體架構已現，但細節仍有缺憾。老子云：「企者不立，跨者不行。」建議不急於求成，在不足之處多加磨練，等待時機。";
        } else {
            advice = "【致虛守靜：需緩】\n目前多項條件尚未和諧。強行推進恐生禍端。建議回歸內心，重整「道」與「德」，蓄積能量。夫唯不爭，故天下莫能與之爭。";
        }
        
        document.getElementById('result-text').innerText = advice;
    }

    showQuestion();
</script>

</body>
</html>
