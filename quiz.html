<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五維決策導航 - 帛書老子研修室</title>
    <style>
        body { font-family: sans-serif; background: #f4f1ea; display: flex; justify-content: center; padding: 20px; }
        #quiz-app { background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #5d5b57; text-align: center; margin-bottom: 5px; }
        .hint { text-align: center; color: #888; margin-bottom: 25px; font-size: 0.9rem; }
        .q-block { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .q-title { font-weight: bold; margin-bottom: 10px; display: block; }
        .options { display: flex; gap: 5px; justify-content: space-between; }
        .opt-btn { flex: 1; padding: 8px 2px; font-size: 11px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 5px; }
        .opt-btn.active { background: #5d5b57; color: white; border-color: #5d5b57; }
        #submit-btn { width: 100%; padding: 15px; background: #8a7d6a; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
        #result-box { margin-top: 30px; padding: 20px; border-radius: 10px; background: #f9f9f9; text-align: center; display: none; border: 2px solid #5d5b57; }
        .status-big { font-size: 3rem; font-weight: bold; margin: 10px 0; display: block; }
    </style>
</head>
<body>

<div id="quiz-app">
    <h2>帛書老子研修室</h2>
    <p class="hint">「請針對你要做決策的一件事情」</p>

    <div id="questions-list"></div>

    <button id="submit-btn" onclick="calculate()">【 查看結果 】</button>

    <div id="result-box">
        <span style="font-size: 1.1rem;">目前狀態</span>
        <span class="status-big" id="status-display"></span>
        <p id="desc-display" style="font-size: 1.2rem; font-weight: bold;"></p>
        <p style="color: #888; font-size: 0.8rem;">三秒完成，一看就懂</p>
    </div>
</div>

<script>
    const questions = [
        { id: "dao", name: "1. 道", text: "「這件事是否成立？」" },
        { id: "de",  name: "2. 德", text: "「我是否承受得住？」" },
        { id: "wu",  name: "3. 物", text: "「條件是否具備？」" },
        { id: "qi",  name: "4. 器", text: "「是否做得成？」" },
        { id: "shi", name: "5. 勢", text: "「現在適不適合？」" }
    ];

    const optConfig = [
        { t: "明確成立", v: 2 }, { t: "大致成立", v: 1 }, { t: "不確定", v: 0 }, { t: "有問題", v: -1 }, { t: "不成立", v: -2 }
    ];

    let userScores = { dao: null, de: null, wu: null, qi: null, shi: null };

    const list = document.getElementById('questions-list');
    questions.forEach(q => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.innerHTML = `<span class="q-title">${q.name}：${q.text}</span><div class="options" id="row-${q.id}"></div>`;
        list.appendChild(div);
        
        const row = document.getElementById(`row-${q.id}`);
        optConfig.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.t;
            btn.onclick = () => {
                userScores[q.id] = opt.v;
                Array.from(row.children).forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            row.appendChild(btn);
        });
    });

    function calculate() {
        if (Object.values(userScores).includes(null)) {
            alert("請完成所有點選再查看結果");
            return;
        }

        const { dao, de, wu, qi, shi } = userScores;
        const total = dao + de + wu + qi + shi;
        let status = "";
        let desc = "";

        if (dao <= -1) {
            status = "止";
            desc = "要停止";
        } else if (shi <= -1) {
            status = "轉 或 止";
            desc = "要調整 或 要停止";
        } else {
            if (total >= 6) { status = "動"; desc = "可以行動"; }
            else if (total >= 2) { status = "蓄"; desc = "先累積"; }
            else if (total >= -1) { status = "等"; desc = "先觀察"; }
            else if (total >= -5) { status = "轉"; desc = "要調整"; }
            else { status = "止"; desc = "要停止"; }
        }

        document.getElementById('status-display').innerText = status;
        document.getElementById('desc-display').innerText = desc;
        document.getElementById('result-box').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
